<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="theme-color" content="#000000">
  
  <!-- Modo App nativa para Android e iOS -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <title>ADP</title>

  <style>
    /* Elimina cualquier margen, scrollbar o espacio en blanco */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #000000;
    }

    /* El contenedor ocupa el 100% exacto de la pantalla visible */
    .viewport-container {
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      right: 0;
      width: 100%;
      height: 100%;
      border: none;
      margin: 0;
      padding: 0;
    }

    /* Iframe completamente limpio y fluido */
    #viewer {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
  </style>
</head>
<body>

  <div class="viewport-container">
    <iframe 
      id="viewer" 
      src="https://script.google.com/macros/s/AKfycbxSGQLfXg8EquzQ9GCHcqGGAxKQjnBs2pdOi84ZN-TYu0VoJtM__Eetdk0M2yz1EedO5Q/exec"
      allow="geolocation; microphone; camera; midi; vr; accelerometer; gyroscope; payment; ambient-light-sensor; encrypted-media; usb"
      sandbox="allow-forms allow-scripts allow-same-origin allow-popups allow-presentation"
      allowfullscreen>
    </iframe>
  </div>

</body>
</html>
